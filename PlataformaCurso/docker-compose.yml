services:
  # ==========================================
  # Motor de Base de Datos (MySQL)
  # ==========================================
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: admin
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - plataforma-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  register-service:
    build: ./register-service
    container_name: register-service
    ports:
      - "8761:8761"
    environment:
      SERVER_PORT: 8761
    networks:
      - plataforma-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  apigateway:
    build: ./apigateway
    container_name: apigateway
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      EUREKA_SERVER: http://register-service:8761/eureka/
      JWT_SECRET: PlataformaCursoSecretKeyForJwtAuthentication2026SuperSecret
    depends_on:
      register-service:
        condition: service_healthy
    networks:
      - plataforma-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: admin
      EUREKA_SERVER: http://register-service:8761/eureka/
      JWT_SECRET: PlataformaCursoSecretKeyForJwtAuthentication2026SuperSecret
    depends_on:
      mysql-db:
        condition: service_healthy
      register-service:
        condition: service_healthy
    networks:
      - plataforma-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  usuario-service:
    build: ./usuario-service
    container_name: usuario-service
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: admin
      EUREKA_SERVER: http://register-service:8761/eureka/
      JWT_SECRET: PlataformaCursoSecretKeyForJwtAuthentication2026SuperSecret
    depends_on:
      mysql-db:
        condition: service_healthy
      register-service:
        condition: service_healthy
    networks:
      - plataforma-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  curso-service:
    build: ./curso-service
    container_name: curso-service
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: admin
      EUREKA_SERVER: http://register-service:8761/eureka/
      JWT_SECRET: PlataformaCursoSecretKeyForJwtAuthentication2026SuperSecret
    depends_on:
      mysql-db:
        condition: service_healthy
      register-service:
        condition: service_healthy
    networks:
      - plataforma-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  inscripcion-service:
    build: ./inscripciones-service
    container_name: inscripcion-service
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: admin
      EUREKA_SERVER: http://register-service:8761/eureka/
      JWT_SECRET: PlataformaCursoSecretKeyForJwtAuthentication2026SuperSecret
    depends_on:
      mysql-db:
        condition: service_healthy
      register-service:
        condition: service_healthy
    networks:
      - plataforma-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8084/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  historial-service:
    build: ./historial-service
    container_name: historial-service
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: admin
      EUREKA_SERVER: http://register-service:8761/eureka/
      JWT_SECRET: PlataformaCursoSecretKeyForJwtAuthentication2026SuperSecret
    depends_on:
      mysql-db:
        condition: service_healthy
      register-service:
        condition: service_healthy
    networks:
      - plataforma-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8085/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  notificacion-service:
    build: ./notificacion-service
    container_name: notificacion-service
    ports:
      - "8086:8086"
    environment:
      SERVER_PORT: 8086
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: admin
      EUREKA_SERVER: http://register-service:8761/eureka/
      JWT_SECRET: PlataformaCursoSecretKeyForJwtAuthentication2026SuperSecret
      AWS_REGION: ${AWS_REGION:-us-east-1}
      SQS_QUEUE_URL: ${SQS_QUEUE_URL:-}
    depends_on:
      mysql-db:
        condition: service_healthy
      register-service:
        condition: service_healthy
    networks:
      - plataforma-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8086/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql_data:

networks:
  plataforma-network:
    driver: bridge
