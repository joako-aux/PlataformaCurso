# ==========================================
# Información del Servicio
# ==========================================
spring.application.name=notificacion-service
server.port=${SERVER_PORT:8086}

# ==========================================
# Base de Datos MySQL
# ==========================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/db_plataforma_notifications?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:admin}

# ==========================================
# JPA / Hibernate
# ==========================================
# CORRECCIÓN: Cambiado a 'validate' para evitar que Hibernate interfiera con Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ==========================================
# Migraciones Flyway
# ==========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.create-schemas=true

# ==========================================
# Seguridad JWT
# ==========================================
# CORRECCIÓN: Vinculado a la variable de entorno global del entorno Docker
jwt.secret=${JWT_SECRET:PlataformaCursoSecretKeyForJwtAuthentication2026SuperSecret}
jwt.expiration=86400000

# ==========================================
# Documentación API (Swagger/Springdoc)
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ==========================================
# Configuración de Cliente Eureka
# ==========================================
eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Optimización para contenedores y ruteo interno de Docker
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=20