# Informaci’┐Įn del Servicio
spring.application.name=curso-service
server.port=8083

# Configuraci’┐Įn de Base de Datos (MySQL)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/db_plataforma_courses?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:admin}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Migraciones Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.create-schemas=true


# Seguridad JWT
jwt.secret=PlataformaCursoSecretKeyForJwtAuthentication2026SuperSecret
jwt.expiration=86400000

# Documentaci’┐Įn API (Swagger/Springdoc)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ==========================================
# Configuraci’┐Įn de Cliente Eureka
# ==========================================
eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://register-service:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true