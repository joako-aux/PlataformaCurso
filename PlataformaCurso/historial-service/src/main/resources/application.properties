# ==========================================
# Informaciˇn del Servicio
# ==========================================
spring.application.name=historial-service
server.port=${SERVER_PORT:8085}

# ==========================================
# Base de Datos MySQL
# ==========================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/db_plataforma_history?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:admin}

# ==========================================
# JPA
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# JWT
# ==========================================
jwt.secret=PlataformaCursoSecretKeyForJwtAuthentication2026SuperSecret
jwt.expiration=86400000

# ==========================================
# Swagger
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ==========================================
# Eureka
# ==========================================
eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://register-service:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true