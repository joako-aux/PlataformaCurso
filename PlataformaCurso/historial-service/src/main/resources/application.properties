# ==========================================
# Información del Servicio
# ==========================================
spring.application.name=historial-service
server.port=${SERVER_PORT:8085}

# ==========================================
# Base de Datos MySQL
# ==========================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/db_plataforma_history?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:admin}

# ==========================================
# JPA / Hibernate
# ==========================================
# Nota: Si decides migrar a Flyway más adelante, cambia esto a 'validate'
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==========================================
# Seguridad JWT
# ==========================================
# CORRECCIÓN: Vinculado a la variable de entorno global para evitar desincronización
jwt.secret=${JWT_SECRET:PlataformaCursoSecretKeyForJwtAuthentication2026SuperSecret}
jwt.expiration=86400000

# ==========================================
# Documentación API (Swagger/Springdoc)
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ==========================================
# Configuración de Cliente Eureka
# ==========================================
# CORRECCIÓN: Se eliminó la 'e' extra en la propiedad
eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Optimización para la red y contenedores de Docker
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=20