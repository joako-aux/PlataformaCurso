# ==========================================
# Información del Servicio
# ==========================================
spring.application.name=apigateway
server.port=${SERVER_PORT:8080}

# ==========================================
# Seguridad
# ==========================================
jwt.secret=${JWT_SECRET:claveSecretaPorDefectoDe32CaracteresMinimoParaDesarrolloLocal}

# ==========================================
# Swagger
# ==========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.generated-docs.gateway.enabled=true

# ==========================================
# Eureka
# ==========================================
eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ==========================================
# Logs
# ==========================================
logging.level.com.plataformacurso.apigateway=DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG

# ==========================================
# Rutas del Gateway
# ==========================================

# Auth Service (Público)
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# Historial Service
spring.cloud.gateway.routes[1].id=historial-service
spring.cloud.gateway.routes[1].uri=lb://HISTORIAL-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/historial/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[1].filters[1]=AuthenticationFilter

# Curso Service
spring.cloud.gateway.routes[2].id=curso-service
spring.cloud.gateway.routes[2].uri=lb://CURSO-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/cursos/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[2].filters[1]=AuthenticationFilter

# Usuario Service
spring.cloud.gateway.routes[3].id=usuario-service
spring.cloud.gateway.routes[3].uri=lb://USUARIO-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/usuarios/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[3].filters[1]=AuthenticationFilter

# Inscripciones Service
spring.cloud.gateway.routes[4].id=inscripciones-service
spring.cloud.gateway.routes[4].uri=lb://INSCRIPCIONES-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/inscripciones/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[4].filters[1]=AuthenticationFilter

# Notificación Service
spring.cloud.gateway.routes[5].id=notificacion-service
spring.cloud.gateway.routes[5].uri=lb://NOTIFICACION-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/notificaciones/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[5].filters[1]=AuthenticationFilter
# ==========================================
# Actuator (health checks para Docker/Swarm)
# ==========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
