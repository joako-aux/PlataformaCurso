spring.application.name=apigateway
server.port=8080

# Registro y localización de Eureka Server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Configuración de Swagger centralizado en el Gateway
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
# Autodetecta la documentación de los microservicios registrados en Eureka
springdoc.generated-docs.gateway.enabled=true

# FORMATO DE LOGS CON COLORES (Coincidiendo con tus microservicios)
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr([%X{traceId:-},%X{spanId:-}]){yellow} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n
logging.level.com.plataformacurso.apigateway=INFO

# ===================================================================
# RUTAS DEL GATEWAY (Mismo bloque que ya tenías)
# ===================================================================
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.server.webflux.routes[1].id=historial-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://HISTORIAL-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/historial/**

spring.cloud.gateway.server.webflux.routes[2].id=curso-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://CURSO-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/cursos/**

spring.cloud.gateway.server.webflux.routes[3].id=usuario-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://USUARIO-SERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/usuarios/**

spring.cloud.gateway.server.webflux.routes[4].id=inscripciones-service
spring.cloud.gateway.server.webflux.routes[4].uri=lb://INSCRIPCIONES-SERVICE
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/inscripciones/**

spring.cloud.gateway.server.webflux.routes[5].id=notificacion-service
spring.cloud.gateway.server.webflux.routes[5].uri=lb://NOTIFICACION-SERVICE
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/notificaciones/**

# RUTAS PROTEGIDAS CON FILTRO JWT
spring.cloud.gateway.server.webflux.routes[6].id=historial-service-secured
spring.cloud.gateway.server.webflux.routes[6].uri=lb://HISTORIAL-SERVICE
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/api/secured/historial/**
spring.cloud.gateway.server.webflux.routes[6].filters[0]=AuthenticationFilter

spring.cloud.gateway.server.webflux.routes[7].id=curso-service-secured
spring.cloud.gateway.server.webflux.routes[7].uri=lb://CURSO-SERVICE
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/api/secured/cursos/**
spring.cloud.gateway.server.webflux.routes[7].filters[0]=AuthenticationFilter

spring.cloud.gateway.server.webflux.routes[8].id=usuario-service-secured
spring.cloud.gateway.server.webflux.routes[8].uri=lb://USUARIO-SERVICE
spring.cloud.gateway.server.webflux.routes[8].predicates[0]=Path=/api/secured/usuarios/**
spring.cloud.gateway.server.webflux.routes[8].filters[0]=AuthenticationFilter

spring.cloud.gateway.server.webflux.routes[9].id=inscripciones-service-secured
spring.cloud.gateway.server.webflux.routes[9].uri=lb://INSCRIPCIONES-SERVICE
spring.cloud.gateway.server.webflux.routes[9].predicates[0]=Path=/api/secured/inscripciones/**
spring.cloud.gateway.server.webflux.routes[9].filters[0]=AuthenticationFilter