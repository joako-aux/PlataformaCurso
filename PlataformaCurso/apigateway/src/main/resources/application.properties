# =======================================================
# CONFIGURACIÓN GENERAL DEL API GATEWAY
# =======================================================
spring.application.name=apigateway
server.port=8080

# Conexión con el Service Registry Eureka (tu 'register-service' en el puerto 8761)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# =======================================================
# 1. ENRUTAMIENTO DE NEGOCIO (Hacia tus microservicios)
# =======================================================

# Ruta para el servicio de Autenticación (Auth)
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# Ruta para el servicio de Usuarios
spring.cloud.gateway.routes[1].id=usuario-service
spring.cloud.gateway.routes[1].uri=lb://USUARIO-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/usuarios/**

# Ruta para el servicio de Cursos
spring.cloud.gateway.routes[2].id=curso-service
spring.cloud.gateway.routes[2].uri=lb://CURSO-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/cursos/**

# Ruta para el servicio de Inscripciones
spring.cloud.gateway.routes[3].id=inscripciones-service
spring.cloud.gateway.routes[3].uri=lb://INSCRIPCIONES-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/inscripciones/**

# Ruta para el servicio de Notificaciones
spring.cloud.gateway.routes[4].id=notificacion-service
spring.cloud.gateway.routes[4].uri=lb://NOTIFICACION-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/notificaciones/**

# Ruta para el servicio de Historial
spring.cloud.gateway.routes[5].id=historial-service
spring.cloud.gateway.routes[5].uri=lb://HISTORIAL-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/historial/**

# =======================================================
# 2. ENRUTAMIENTO DE DOCUMENTACIÓN SWAGGER OPENAPI
# =======================================================

# OpenAPI de Auth
spring.cloud.gateway.routes[6].id=auth-openapi
spring.cloud.gateway.routes[6].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/auth-service/v3/api-docs/**
spring.cloud.gateway.routes[6].filters[0]=RewritePath=/auth-service/(?<segment>.*), /$\\{segment}

# OpenAPI de Usuarios
spring.cloud.gateway.routes[7].id=usuario-openapi
spring.cloud.gateway.routes[7].uri=lb://USUARIO-SERVICE
spring.cloud.gateway.routes[7].predicates[0]=Path=/usuario-service/v3/api-docs/**
spring.cloud.gateway.routes[7].filters[0]=RewritePath=/usuario-service/(?<segment>.*), /$\\{segment}

# OpenAPI de Cursos
spring.cloud.gateway.routes[8].id=curso-openapi
spring.cloud.gateway.routes[8].uri=lb://CURSO-SERVICE
spring.cloud.gateway.routes[8].predicates[0]=Path=/curso-service/v3/api-docs/**
spring.cloud.gateway.routes[8].filters[0]=RewritePath=/curso-service/(?<segment>.*), /$\\{segment}

# OpenAPI de Inscripciones
spring.cloud.gateway.routes[9].id=inscripciones-openapi
spring.cloud.gateway.routes[9].uri=lb://INSCRIPCIONES-SERVICE
spring.cloud.gateway.routes[9].predicates[0]=Path=/inscripciones-service/v3/api-docs/**
spring.cloud.gateway.routes[9].filters[0]=RewritePath=/inscripciones-service/(?<segment>.*), /$\\{segment}

# OpenAPI de Notificaciones
spring.cloud.gateway.routes[10].id=notificacion-openapi
spring.cloud.gateway.routes[10].uri=lb://NOTIFICACION-SERVICE
spring.cloud.gateway.routes[10].predicates[0]=Path=/notificacion-service/v3/api-docs/**
spring.cloud.gateway.routes[10].filters[0]=RewritePath=/notificacion-service/(?<segment>.*), /$\\{segment}

# OpenAPI de Historial
spring.cloud.gateway.routes[11].id=historial-openapi
spring.cloud.gateway.routes[11].uri=lb://HISTORIAL-SERVICE
spring.cloud.gateway.routes[11].predicates[0]=Path=/historial-service/v3/api-docs/**
spring.cloud.gateway.routes[11].filters[0]=RewritePath=/historial-service/(?<segment>.*), /$\\{segment}

# =======================================================
# 3. CONFIGURACIÓN DEL MENÚ DESPLEGABLE DE SWAGGER UI
# =======================================================
springdoc.swagger-ui.urls[0].name=1. Servicio de Autenticación (Auth)
springdoc.swagger-ui.urls[0].url=/auth-service/v3/api-docs

springdoc.swagger-ui.urls[1].name=2. Servicio de Usuarios
springdoc.swagger-ui.urls[1].url=/usuario-service/v3/api-docs

springdoc.swagger-ui.urls[2].name=3. Servicio de Cursos
springdoc.swagger-ui.urls[2].url=/curso-service/v3/api-docs

springdoc.swagger-ui.urls[3].name=4. Servicio de Inscripciones
springdoc.swagger-ui.urls[3].url=/inscripciones-service/v3/api-docs

springdoc.swagger-ui.urls[4].name=5. Servicio de Notificaciones
springdoc.swagger-ui.urls[4].url=/notificacion-service/v3/api-docs

springdoc.swagger-ui.urls[5].name=6. Servicio de Historial
springdoc.swagger-ui.urls[5].url=/historial-service/v3/api-docs