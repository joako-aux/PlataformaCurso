# ==========================================
# Información del Servicio
# ==========================================
spring.application.name=usuario-service
server.port=${SERVER_PORT:8082}

# ==========================================
# Base de Datos MySQL
# ==========================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/db_plataforma_users?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:admin}

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==========================================
# Migraciones Flyway
# ==========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.create-schemas=true

# ==========================================
# Seguridad JWT
# ==========================================
jwt.secret=${JWT_SECRET:PlataformaCursoSecretKeyForJwtAuthentication2026SuperSecret}
jwt.expiration=86400000

# ==========================================
# Documentación API (Swagger/Springdoc)
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ==========================================
# Configuración de Cliente Eureka
# ==========================================
eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Optimización de tiempos de respuesta y ruteo en Docker
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=20
# ==========================================
# Actuator (health checks para Docker/Swarm)
# ==========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
