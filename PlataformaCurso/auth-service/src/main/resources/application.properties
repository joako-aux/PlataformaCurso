spring.application.name=auth-service
server.port=8081

# Base de datos Laragon / MySQL de QuickBite
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/quickbite_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Registro automático en el Servidor de Descubrimiento (Register Service)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Propiedades del JWT
jwt.secret=QuickBiteSecretKeyForJwtAuthentication2026SuperSecret
jwt.expiration=86400000

# Swagger
springdoc.api-docs.path=/v3/api-docs