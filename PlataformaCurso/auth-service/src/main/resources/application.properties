# ===================================================================
# CONFIGURACIÓN DEL SERVIDOR Y NOMBRE DE LA APLICACIÓN
# ===================================================================
server.port=8081
spring.application.name=auth-service

# ===================================================================
# CONFIGURACIÓN DE CONEXIÓN A MYSQL (SIN CONTRASEÑA)
# ===================================================================
# IMPORTANTE: Asegúrate de haber creado la base de datos vacía ejecutando:
# CREATE DATABASE db_plataforma;
spring.datasource.url=jdbc:mysql://localhost:3306/db_plataforma?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
# Dejar vacío después del signo igual para indicar que no tiene contraseña
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===================================================================
# 'update' creará y actualizará las tablas de tus entidades automáticamente
spring.jpa.hibernate.ddl-auto=update
# Muestra las consultas SQL que realiza Hibernate de forma legible en la consola
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===================================================================
# CONFIGURACIÓN DE EUREKA CLIENT (REGISTRO EN EUREKA SERVER)
# ===================================================================
# URL donde está corriendo tu servidor de descubrimiento Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/