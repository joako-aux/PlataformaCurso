# El microservicio de autenticación correrá internamente en el puerto 8081
server.port=8081
spring.application.name=auth-service

# Conexión a la Base de Datos MySQL (Ajusta usuario/password si tu equipo usa otros)
spring.datasource.url=jdbc:mysql://localhost:3306/user_bd?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Registro en el Eureka Server (Service Registry de la Plataforma)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Propiedades del JWT (La firma secreta compartida con el API Gateway)
jwt.secret=claveSecretaPorDefectoDe32CaracteresMinimoParaDesarrolloLocal
jwt.expiration=3600000

# Logs unificados del sistema usando SLF4J
logging.level.root=INFO
logging.level.com.plataformacurso.auth_service=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n