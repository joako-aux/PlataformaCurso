name: CI/CD - PlataformaCurso

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/plataformacurso

jobs:
  # ============================================================
  # 1) TEST: build + pruebas unitarias de cada microservicio
  # ============================================================
  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - register-service
          - apigateway
          - auth-service
          - usuario-service
          - curso-service
          - inscripciones-service
          - historial-service
          - notificacion-service
    defaults:
      run:
        working-directory: PlataformaCurso/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Ejecutar pruebas unitarias
        run: mvn -B clean test

  # ============================================================
  # 2) BUILD & PUSH: construye la imagen Docker de cada
  #    microservicio y la publica en el registro (GHCR)
  # ============================================================
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - register-service
          - apigateway
          - auth-service
          - usuario-service
          - curso-service
          - inscripciones-service
          - historial-service
          - notificacion-service
    steps:
      - uses: actions/checkout@v4

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push de la imagen
        uses: docker/build-push-action@v5
        with:
          context: PlataformaCurso/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest

  # ============================================================
  # 3) PROVISION CLOUD: aprovisiona la cola SQS, el API Gateway
  #    y las funciones Lambda con AWS SAM (infraestructura como
  #    código, ver serverless/notificacion-lambda/template.yaml)
  # ============================================================
  provision-serverless:
    name: Provision cloud (SQS + Lambda + API Gateway)
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PlataformaCurso/serverless/notificacion-lambda
    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Instalar SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: sam build
        run: sam build

      - name: sam deploy (crea/actualiza cola SQS, Lambdas y API Gateway)
        run: |
          sam deploy \
            --stack-name plataformacurso-serverless \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3 \
            --parameter-overrides NotificacionServiceUrl=${{ secrets.NOTIFICACION_SERVICE_URL }}

  # ============================================================
  # 4) DEPLOY: publica el stack en el clúster Docker Swarm
  #    (etapa manual/condicionada a que existan los secrets SSH)
  # ============================================================
  deploy-swarm:
    name: Deploy a Docker Swarm
    needs: [ build-and-push, provision-serverless ]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copiar docker-stack.yml al manager y desplegar
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          port: 22
          envs: GITHUB_SHA
          script: |
            rm -rf PlataformaCursoRepo
            git clone https://github.com/${{ github.repository }}.git PlataformaCursoRepo
            cd PlataformaCursoRepo/PlataformaCurso

            export IMAGE_PREFIX=${{ env.IMAGE_PREFIX }}
            export IMAGE_TAG=${{ github.sha }}
            export AWS_REGION=${{ secrets.AWS_REGION }}
            export SQS_QUEUE_URL=${{ secrets.SQS_QUEUE_URL }}

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            if ! docker info | grep -q "Swarm: active"; then
              docker swarm init --advertise-addr $(hostname -I | awk '{print $1}')
            fi

            docker stack deploy -c docker-stack.yml plataforma --with-registry-auth
            docker stack services plataforma
